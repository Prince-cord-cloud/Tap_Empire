<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tap Empire · Modern Clicker</title>
    <style>
        :root {
            --bg-base: #0a0f1d;
            --bg-surface: rgba(16, 22, 42, 0.7);
            --bg-card: #111a2e;
            --border-color: rgba(255, 255, 255, 0.08);
            --color-primary: #38bdf8;
            --color-success: #10b981;
            --color-accent: #fbbf24;
            --color-danger: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg-base) 70%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-family);
            color: var(--text-main);
            padding: 16px;
            overflow-x: hidden;
        }

        /* Main Layout Container */
        .game-container {
            max-width: 480px;
            width: 100%;
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Header Stats Panel */
        .stats-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stat-icon-wrapper {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(56, 189, 248, 0.1);
            color: var(--color-primary);
        }

        .stat-card.accent .stat-icon-wrapper {
            background: rgba(251, 191, 36, 0.1);
            color: var(--color-accent);
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .income-ticker {
            grid-column: span 2;
            text-align: center;
            font-size: 0.85rem;
            color: var(--color-success);
            font-weight: 600;
            background: rgba(16, 185, 129, 0.08);
            padding: 6px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Core Tap Playground */
        .tap-zone {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            position: relative;
        }

        .tap-button {
            background: radial-gradient(circle at 35% 30%, #2563eb 0%, #1d4ed8 70%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 4px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(29, 78, 216, 0.3), 
                        inset 0 -8px 16px rgba(0, 0, 0, 0.3), 
                        inset 0 4px 12px rgba(255, 255, 255, 0.4);
            transition: transform 0.05s linear, box-shadow 0.1s;
            color: white;
            touch-action: manipulation;
        }

        .tap-button:active {
            transform: scale(0.94);
            box-shadow: 0 8px 20px rgba(29, 78, 216, 0.4), inset 0 -2px 4px rgba(0, 0, 0, 0.4);
        }

        .tap-button svg {
            width: 56px;
            height: 56px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .tap-action-text {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            margin-top: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Upgrade Dashboard Shop */
        .shop-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-header {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header svg {
            width: 16px;
            height: 16px;
            color: var(--color-primary);
        }

        .upgrade-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .upgrade-row {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            transition: border-color 0.2s, background 0.2s;
        }

        .upgrade-row:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .upgrade-media {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .upgrade-row.can-afford .upgrade-media {
            color: var(--color-primary);
            background: rgba(56, 189, 248, 0.05);
        }

        .upgrade-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .upgrade-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .upgrade-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .upgrade-action {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .btn-purchase {
            background: var(--color-success);
            border: none;
            color: white;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-purchase:active {
            transform: scale(0.97);
        }

        .btn-purchase:disabled {
            background: #334155;
            color: #64748b;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Control Utilities Footer */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 8px;
        }

        .btn-utility {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            color: var(--text-main);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: background 0.2s, border-color 0.2s;
        }

        .btn-utility:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-utility svg {
            width: 16px;
            height: 16px;
            color: var(--text-muted);
        }

        .btn-utility.danger:hover {
            background: rgba(248, 113, 113, 0.1);
            border-color: var(--color-danger);
            color: var(--color-danger);
        }

        .btn-utility.danger:hover svg {
            color: var(--color-danger);
        }

        /* Micro Feedback Particles */
        .particle-feedback {
            position: fixed;
            pointer-events: none;
            font-weight: 800;
            font-size: 1.5rem;
            z-index: 9999;
            color: #fff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
            animation: moveUpFade 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes moveUpFade {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.1); }
        }

        .toast-banner {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(40px);
            background: #0f172a;
            border: 1px solid var(--color-primary);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 10000;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast-banner.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .game-footer {
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        @media (max-width: 400px) {
            .game-container { padding: 16px; gap: 16px; }
            .tap-button { width: 170px; height: 170px; }
            .stat-value { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-icon-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9z"/></svg>
            </div>
            <div class="stat-info">
                <span class="stat-label">Gems</span>
                <span class="stat-value" id="balanceDisplay">0</span>
            </div>
        </div>
        <div class="stat-card accent">
            <div class="stat-icon-wrapper">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            </div>
            <div class="stat-info">
                <span class="stat-label">Power</span>
                <span class="stat-value" id="tapPowerDisplay">1</span>
            </div>
        </div>
        <div class="income-ticker">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
            Passive Income: <span id="incomePerSec">+0/sec</span>
        </div>
    </div>

    <div class="tap-zone">
        <button class="tap-button" id="mainTapButton">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v12"/><path d="M6 12h12"/></svg>
            <div class="tap-action-text" id="tapPowerLabel">Tap +1</div>
        </button>
    </div>

    <div class="shop-section">
        <div class="section-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
            Upgrades Matrix
        </div>
        <div class="upgrade-list" id="upgradesContainer">
            </div>
    </div>

    <div>
        <div class="control-grid">
            <button class="btn-utility danger" id="hardResetBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                Reset
            </button>
            <button class="btn-utility" id="saveGameBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save
            </button>
            <button class="btn-utility" id="loadGameBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Load
            </button>
        </div>
    </div>

    <footer class="game-footer">
        Precision Striking Module Active · 10% Probability for Critical Influx
    </footer>
</div>

<div class="toast-banner" id="toastBanner"></div>

<script>
    // System Configurations & Core State Initialization
    let gameState = {
        balance: 100,
        tapLevel: 0,
        passiveLevel: 0,
        criticalLevel: 0
    };

    const UPGRADES = [
        {
            id: "tap",
            name: "Kinetic Amplifiers",
            desc: "Adds +1 to base impact power",
            baseCost: 25,
            costMultiplier: 1.45,
            iconPath: '<path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"/><path d="M6 3a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"/>',
            getBonusText: (state) => `+1 Tap Power`,
            getCurrentMeta: (state) => `Current: +${1 + state.tapLevel}`,
            onPurchase: (state) => { state.tapLevel++; },
            getCost: (state) => Math.floor(25 * Math.pow(1.45, state.tapLevel))
        },
        {
            id: "passive",
            name: "Automated Extractors",
            desc: "Generates hands-free yields continuously",
            baseCost: 40,
            costMultiplier: 1.5,
            iconPath: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
            getBonusText: (state) => `+1.5/sec`,
            getCurrentMeta: (state) => `Current: +${((state.passiveLevel) * 1.5).toFixed(1)}/s`,
            onPurchase: (state) => { state.passiveLevel++; },
            getCost: (state) => Math.floor(40 * Math.pow(1.5, state.passiveLevel))
        },
        {
            id: "critical",
            name: "Quantum Focus",
            desc: "Improves critical calculation spikes",
            baseCost: 70,
            costMultiplier: 1.7,
            iconPath: '<circle cx="12" cy="12" r="10"/><path d="m4.93 4.93 4.24 4.24"/><path d="m14.83 9.17 4.24-4.24"/><path d="m14.83 14.83 4.24 4.24"/><path d="m9.17 14.83-4.24 4.24"/>',
            getBonusText: (state) => `+0.5x Multiplier`,
            getCurrentMeta: (state) => `Current: ${(3 + (state.criticalLevel * 0.5)).toFixed(1)}x`,
            onPurchase: (state) => { state.criticalLevel++; },
            getCost: (state) => Math.floor(70 * Math.pow(1.7, state.criticalLevel))
        }
    ];

    // Compute Derivatives
    function getTapPower(state) { return 1 + state.tapLevel; }
    function getPassiveIncome(state) { return state.passiveLevel * 1.5; }
    function getCritMultiplier(state) { return 3 + (state.criticalLevel * 0.5); }

    // DOM Selection Matrix
    const balanceDisplay = document.getElementById("balanceDisplay");
    const tapPowerDisplay = document.getElementById("tapPowerDisplay");
    const tapPowerLabel = document.getElementById("tapPowerLabel");
    const incomePerSec = document.getElementById("incomePerSec");
    const upgradesContainer = document.getElementById("upgradesContainer");
    const mainTapButton = document.getElementById("mainTapButton");
    const toastBanner = document.getElementById("toastBanner");

    // UI Orchestrator
    function updateUI() {
        balanceDisplay.innerText = Math.floor(gameState.balance).toLocaleString();
        const currentTap = getTapPower(gameState);
        tapPowerDisplay.innerText = currentTap;
        tapPowerLabel.innerText = `Tap +${currentTap}`;
        incomePerSec.innerText = `+${getPassiveIncome(gameState).toFixed(1)}/sec`;
        renderShop();
    }

    function renderShop() {
        // Prevent complete DOM wipe to save processing cycles
        const rowsHTML = UPGRADES.map((up, idx) => {
            const cost = up.getCost(gameState);
            const canAfford = gameState.balance >= cost;
            return `
                <div class="upgrade-row ${canAfford ? 'can-afford' : ''}">
                    <div class="upgrade-media">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;">
                            ${up.iconPath}
                        </svg>
                    </div>
                    <div class="upgrade-details">
                        <div class="upgrade-title">${up.name}</div>
                        <div class="upgrade-meta">${up.desc}</div>
                        <div class="upgrade-meta" style="color:var(--color-primary); font-weight:500;">
                            ${up.getCurrentMeta(gameState)} &rarr; <span style="color:var(--color-success)">${up.getBonusText(gameState)}</span>
                        </div>
                    </div>
                    <div class="upgrade-action">
                        <button class="btn-purchase" data-index="${idx}" ${!canAfford ? 'disabled' : ''}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:12px;height:12px;"><path d="M6 3h12l4 6-10 13L2 9z"/></svg>
                            ${cost}
                        </button>
                    </div>
                </div>
            `;
        }).join('');
        
        upgradesContainer.innerHTML = rowsHTML;

        // Dynamic event binding
        upgradesContainer.querySelectorAll(".btn-purchase").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const idx = parseInt(e.currentTarget.getAttribute("data-index"));
                buyUpgrade(idx);
            });
        });
    }

    function buyUpgrade(idx) {
        const up = UPGRADES[idx];
        const cost = up.getCost(gameState);
        if (gameState.balance >= cost) {
            gameState.balance -= cost;
            up.onPurchase(gameState);
            updateUI();
            triggerToast(`${up.name} upgraded successfully`);
            saveToStorage();
        }
    }

    // Advanced Input Particle Triggers
    function spawnVisualFeedback(x, y, text, color = 'var(--text-main)') {
        const particle = document.createElement("div");
        particle.className = "particle-feedback";
        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;
        particle.style.color = color;
        particle.innerText = text;
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 600);
    }

    function handleTapInteraction(e) {
        e.preventDefault();
        
        let clientX = e.clientX;
        let clientY = e.clientY;
        
        if (e.changedTouches && e.changedTouches.length > 0) {
            clientX = e.changedTouches[0].clientX;
            clientY = e.changedTouches[0].clientY;
        }

        const base = getTapPower(gameState);
        const isCrit = Math.random() < 0.10; // 10% Chance
        const yieldAmount = isCrit ? (base * getCritMultiplier(gameState)) : base;

        gameState.balance += yieldAmount;
        updateUI();

        if (isCrit) {
            spawnVisualFeedback(clientX, clientY, `CRIT! +${yieldAmount.toFixed(0)}`, 'var(--color-accent)');
        } else {
            spawnVisualFeedback(clientX, clientY, `+${yieldAmount}`);
        }
    }

    // Engine Loops & Infrastructure
    setInterval(() => {
        const structuralIncome = getPassiveIncome(gameState) / 10;
        if (structuralIncome > 0) {
            gameState.balance += structuralIncome;
            // Native smooth continuous ticks inside balances without flashing shop components constantly
            balanceDisplay.innerText = Math.floor(gameState.balance).toLocaleString();
            
            // Periodically refresh store viability highlights
            if(Math.random() < 0.2) { renderShop(); }
        }
    }, 100);

    // Storage Interfaces
    function saveToStorage() {
        localStorage.setItem("tap_empire_engine", JSON.stringify(gameState));
    }

    function loadFromStorage() {
        const backup = localStorage.getItem("tap_empire_engine");
        if (backup) {
            try {
                const parsed = JSON.parse(backup);
                if (typeof parsed.balance === "number") gameState = parsed;
            } catch (err) {
                console.error("Storage corruption detected. Fallback initiated.");
            }
        }
        updateUI();
    }

    function triggerToast(msg) {
        toastBanner.innerText = msg;
        toastBanner.classList.add("visible");
        setTimeout(() => toastBanner.classList.remove("visible"), 2000);
    }

    // Interactivity Listeners
    mainTapButton.addEventListener("pointerdown", handleTapInteraction);
    document.getElementById("saveGameBtn").addEventListener("click", () => { saveToStorage(); triggerToast("Engine matrix snapshot saved."); });
    document.getElementById("loadGameBtn").addEventListener("click", () => { loadFromStorage(); triggerToast("Historical snapshot deployed."); });
    document.getElementById("hardResetBtn").addEventListener("click", () => {
        gameState = { balance: 100, tapLevel: 0, passiveLevel: 0, criticalLevel: 0 };
        saveToStorage();
        updateUI();
        triggerToast("Systems wiped. Core reset complete.");
    });

    // Initialize Simulation
    loadFromStorage();
</script>
</body>
</html>
